<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção - FLAT MKT</title>
    <link rel="icon" type="image/png" href="src/img/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="em-construcao.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&family=Russo+One&display=swap"
        rel="stylesheet">
</head>

<body class="wip-body">

    <!-- Navbar -->
    <header class="navbar">
        <div class="navbar_content">
            <div class="logo">
                <img src="src/img/logo.svg" alt="Logo Flat MKT">
            </div>

            <div class="menu-toggle" id="menu-toggle">
                <img src="src/img/detalhe-azul-claro.svg" alt="Menu" class="menu-toggle-icon">
            </div>

            <nav>
                <ul class="menu" id="menu">
                    <li><a href="index.html#sobre">Sobre Nós</a></li>
                    <li><a href="index.html#servicos">Serviços</a></li>
                    <li><a href="index.html#projetos">Projetos</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Página em construção -->
    <main class="wip">

        <!-- Decorativos giratórios -->
        <img src="src/img/detalhe.svg"    alt="" class="wip-deco wip-deco--1">
        <img src="src/img/detalhe-azul-claro.svg" alt="" class="wip-deco wip-deco--2">
        <img src="src/img/detalhe-branco.svg"     alt="" class="wip-deco wip-deco--3">

        <div class="wip-content">

            <p class="wip-label">— página em construção —</p>

            <h1 class="wip-title">
                <span>ESTAMOS</span><br>
                <span class="blue">CONSTRUINDO</span><br>
                <span>ALGO</span> <span class="blue">GRANDE.</span>
            </h1>

            <p class="wip-sub">
                Novas ideias tomam forma aqui.<br>
                Em breve, mais uma experiência que vende.
            </p>

            <a href="index.html" class="btn wip-btn">Voltar para a home</a>

        </div>

        <!-- Barra de progresso decorativa -->
        <div class="wip-progress-wrap">
            <div class="wip-progress-track">
                <div class="wip-progress-bar"></div>
            </div>
            <span class="wip-progress-label">Em desenvolvimento</span>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
